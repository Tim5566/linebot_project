<!DOCTYPE html>
<html lang="zh-TW" style="scroll-behavior:smooth">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>重大訊息 — JellyStock 盤後雷達</title>
  <meta name="description" content="台股上市上櫃今日重大訊息公告，資料來源 TWSE、TPEx 官方，即時更新。"/>
  <meta property="og:title" content="重大訊息 — JellyStock 盤後雷達"/>
  <meta property="og:description" content="台股上市上櫃今日重大訊息公告，資料來源 TWSE、TPEx 官方。"/>
  <meta property="og:image" content="/images/jelly.png"/>
  <link rel="icon" type="image/png" href="/images/jelly.png"/>
  <link rel="apple-touch-icon" href="/images/jelly.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#03060d; --surface:#070d1a; --surface2:#0b1220;
      --border:rgba(0,229,255,.1); --accent:#00e5ff; --green:#00e676;
      --red:#ff3d5a; --yellow:#ffd600;
      --text:#d4e4f7; --text-dim:#7a9ab8; --text-faint:#4a6888;
    }
    *{ margin:0; padding:0; box-sizing:border-box; }
    html,body{ background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; min-height:100vh; }

    /* Header — matches chapter style */
    header {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px 0 16px; height: 58px;
      border-bottom: 1px solid rgba(0,229,255,.09);
      background: rgba(3,6,14,.97);
      backdrop-filter: blur(24px);
      box-shadow: 0 2px 24px rgba(0,0,0,.5);
    }
    .header-left { display:flex; align-items:center; }
    .header-right { display:flex; align-items:center; gap:12px; }
    .logo { display:flex; align-items:center; gap:14px; margin-left:4px; }
    .logo-icon { width:40px; height:40px; border-radius:9px; display:grid; place-items:center; position:relative; flex-shrink:0; overflow:visible; }
    .logo-text { font-family:'Orbitron',monospace; font-size:.95rem; font-weight:700; letter-spacing:.1em; color:#fff; text-shadow:0 0 20px rgba(0,229,255,.4); }
    .logo-sub { font-family:'Share Tech Mono',monospace; font-size:.52rem; color:var(--accent); letter-spacing:.22em; opacity:.65; margin-top:2px; }
    .btn-back {
      display:flex; align-items:center; gap:7px;
      padding:6px 14px; border-radius:20px;
      border:1px solid rgba(0,229,255,.18);
      background:rgba(0,229,255,.05);
      color:var(--text-dim); font-family:'Share Tech Mono',monospace;
      font-size:.68rem; letter-spacing:.08em; cursor:pointer;
      text-decoration:none; transition:all .2s;
    }
    .btn-back:hover { color:var(--accent); border-color:rgba(0,229,255,.35); background:rgba(0,229,255,.1); }
    .btn-back svg { width:14px; height:14px; }
    @keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.3} }

    /* Main */
    main{ max-width:900px; margin:0 auto; padding:28px 16px 60px; }

    /* Page Title */
    .page-title-wrap{ margin-bottom:24px; padding-bottom:18px; border-bottom:1px solid rgba(0,229,255,.08); }
    .page-tag{ font-family:'Share Tech Mono',monospace; font-size:.65rem; color:var(--accent); letter-spacing:.3em; opacity:.9; margin-bottom:8px; }
    .page-title{ font-family:'Orbitron',monospace; font-size:1.35rem; font-weight:900; color:#fff; letter-spacing:.04em; text-shadow:0 0 40px rgba(0,229,255,.3); }
    .page-desc{ font-size:.78rem; color:var(--text); margin-top:8px; line-height:1.7; font-family:'Share Tech Mono',monospace; letter-spacing:.04em; }

    /* Filter */
    .filter-bar{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
    .filter-btn{
      font-family:'Share Tech Mono',monospace; font-size:.68rem; letter-spacing:.1em;
      padding:7px 16px; border-radius:20px; cursor:pointer;
      border:1px solid rgba(0,229,255,.15); background:rgba(0,229,255,.03); color:var(--text-dim);
      transition:all .2s;
    }
    .filter-btn.active, .filter-btn:hover{ color:var(--accent); border-color:rgba(0,229,255,.4); background:rgba(0,229,255,.08); box-shadow:0 0 12px rgba(0,229,255,.12); }
    .refresh-inline{ display:flex; align-items:center; gap:7px; margin-left:auto; font-family:'Share Tech Mono',monospace; font-size:.62rem; color:var(--text-faint); letter-spacing:.06em; white-space:nowrap; }
    .live-dot{ width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:blink 2s ease-in-out infinite; flex-shrink:0; }

    /* Stats */
    .stats-bar{ display:flex; gap:16px; align-items:center; margin-bottom:16px; font-family:'Share Tech Mono',monospace; font-size:.62rem; color:var(--text-dim); letter-spacing:.06em; flex-wrap:wrap; }
    .stats-bar strong{ color:var(--accent); }

    /* News list */
    .news-list{ display:flex; flex-direction:column; gap:8px; }

    .news-card{
      display:flex; align-items:center; gap:14px;
      padding:14px 18px; border-radius:12px;
      background:var(--surface); border:1px solid rgba(0,229,255,.07);
      color:inherit; position:relative; overflow:hidden;
    }
    .news-card::before{
      content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
      background:var(--src-color,var(--accent)); opacity:.6;
    }

    /* Labels */
    .label-twse{ --src-color:#00e5ff; }
    .label-otc { --src-color:#06d6a0; }

    .card-left{ flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:6px; min-width:52px; }
    .src-badge{
      font-family:'Share Tech Mono',monospace; font-size:.58rem; letter-spacing:.1em;
      padding:3px 8px; border-radius:6px;
      color:var(--src-color,var(--accent));
      background:rgba(0,229,255,.06);
      border:1px solid rgba(0,229,255,.15);
      white-space:nowrap;
    }
    .label-otc .src-badge{ color:#06d6a0; background:rgba(6,214,160,.06); border-color:rgba(6,214,160,.2); }
    .card-code{ font-family:'Share Tech Mono',monospace; font-size:.7rem; color:var(--text-dim); letter-spacing:.06em; }

    .card-body{ flex:1; min-width:0; }
    .card-meta{ display:flex; align-items:center; gap:10px; margin-bottom:5px; flex-wrap:wrap; }
    .card-name{ font-size:.82rem; font-weight:700; color:#fff; }
    .card-time{ font-family:'Share Tech Mono',monospace; font-size:.6rem; color:var(--text-dim); }
    .card-title{ font-size:.84rem; color:var(--text); opacity:.85; line-height:1.55; }
    .news-card:hover .card-title{ color:var(--text); }

    .mops-btn{
      flex-shrink:0; display:flex; align-items:center; gap:6px;
      font-family:'Share Tech Mono',monospace; font-size:.62rem; letter-spacing:.08em;
      padding:6px 12px; border-radius:8px; text-decoration:none;
      color:var(--accent); border:1px solid rgba(0,229,255,.2);
      background:rgba(0,229,255,.04); white-space:nowrap;
      transition:all .2s;
    }
    .mops-btn:hover{ background:rgba(0,229,255,.1); border-color:rgba(0,229,255,.4); box-shadow:0 0 12px rgba(0,229,255,.15); }
    .mops-btn svg{ width:12px; height:12px; flex-shrink:0; }

    /* State boxes */
    .state-box{
      text-align:center; padding:60px 20px;
      font-family:'Share Tech Mono',monospace; font-size:.76rem; color:var(--text-faint); letter-spacing:.08em;
      border:1px solid rgba(0,229,255,.07); border-radius:14px; background:var(--surface);
    }
    .state-icon{ font-size:2rem; margin-bottom:14px; }
    .spinner{ width:28px; height:28px; margin:0 auto 16px; border:2px solid rgba(0,229,255,.15); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin{ to{transform:rotate(360deg)} }

    /* Footer note */
    .footer-note{
      margin-top:28px; padding:14px 18px;
      background:rgba(0,229,255,.02); border:1px solid rgba(0,229,255,.06); border-radius:12px;
      font-family:'Share Tech Mono',monospace; font-size:.62rem; color:var(--text-faint); letter-spacing:.05em; line-height:1.8;
    }

    /* Mobile */
    @media(max-width:600px){
      header{ padding:0 12px; height:54px; }
      .logo-text{ font-size:.78rem; }
      .logo-sub{ display:none; }
      .btn-back{ font-size:.62rem; padding:5px 10px; }
      main{ padding:16px 12px 60px; }
      .page-title-wrap{ margin-bottom:18px; padding-bottom:14px; }
      .page-tag{ font-size:.58rem; letter-spacing:.2em; }
      .page-title{ font-size:1.05rem; }
      .page-desc{ font-size:.72rem; }
      .filter-bar{ gap:6px; margin-bottom:16px; }
      .filter-btn{ font-size:.62rem; padding:6px 11px; }
      .stats-bar{ font-size:.58rem; gap:10px; }
      .news-list{ gap:7px; }
      .news-card{ padding:11px 12px; gap:10px; }
      .card-left{ min-width:40px; }
      .src-badge{ font-size:.54rem; padding:2px 6px; }
      .card-code{ font-size:.64rem; }
      .card-name{ font-size:.82rem; }
      .card-time{ font-size:.58rem; }
      .card-title{ font-size:.78rem; line-height:1.5; }
      .mops-btn{ font-size:.58rem; padding:5px 8px; gap:4px; }
      .mops-btn svg{ width:10px; height:10px; }
      .footer-note{ font-size:.6rem; padding:12px 14px; }
    }

    /* ═══════════════════════════════════════════════════════
       ☀️  白天晴空主題 (theme-day)
       ═══════════════════════════════════════════════════════ */
    body.theme-day {
      --bg:         #cce0f2;
      --surface:    rgba(255,255,255,.88);
      --surface2:   rgba(232,246,255,.92);
      --border:     rgba(26,101,168,.18);
      --accent:     #1265a8;
      --green:      #157a32;
      --red:        #b03020;
      --text:       #0c1c2e;
      --text-dim:   #1a3550;
      --text-faint: #3a6080;
    }
    body.theme-day {
      background: linear-gradient(180deg,#6ab8e8 0%,#8ecff5 18%,#b2e0fb 40%,#cceeff 62%,#d8f0f8 80%,#e8f8f0 100%);
    }
    body.theme-day header {
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(20px) saturate(1.8);
      border-bottom: 1px solid rgba(26,123,191,.15);
      box-shadow: 0 2px 20px rgba(26,100,180,.1);
    }
    body.theme-day .logo-text { color:#0a1828; text-shadow:0 1px 4px rgba(26,80,160,.18); }
    body.theme-day .logo-sub  { color:#1265a8; opacity:.85; }
    body.theme-day .logo-icon img { filter:drop-shadow(0 2px 6px rgba(26,100,180,.2)); }
    body.theme-day .btn-back { background:rgba(26,123,191,.08); border-color:rgba(26,123,191,.22); color:#1a4a78; }
    body.theme-day .btn-back:hover { background:rgba(26,123,191,.15); border-color:rgba(26,123,191,.4); color:#0d3560; }

    /* 白天模式 — 高對比深藍方案 */
    body.theme-day .page-tag  { color:#0a3060; opacity:1; font-weight:600; }
    body.theme-day .page-title{ color:#020e1e; text-shadow:none; }
    body.theme-day .page-desc { color:#0a2238; opacity:1; }

    body.theme-day .filter-btn {
      color:#0a2a4a; border-color:rgba(10,48,96,.35);
      background:rgba(255,255,255,.55); font-weight:500;
    }
    body.theme-day .filter-btn.active {
      color:#fff; border-color:#0a4a8a;
      background:#0a4a8a; box-shadow:0 2px 12px rgba(10,74,138,.35);
    }
    body.theme-day .filter-btn:hover:not(.active) {
      color:#0a2a4a; border-color:rgba(10,48,96,.5);
      background:rgba(255,255,255,.75);
    }

    body.theme-day .stats-bar { color:#0a2a4a; }
    body.theme-day .stats-bar strong { color:#0a3a7a; }

    body.theme-day .news-card {
      background: rgba(255,255,255,.95);
      border-color: rgba(10,48,96,.18);
      box-shadow: 0 2px 12px rgba(10,30,80,.12);
    }
    body.theme-day .label-twse { --src-color:#0a4a8a; }
    body.theme-day .label-otc  { --src-color:#0a6a32; }
    body.theme-day .news-card::before { opacity:.8; }
    body.theme-day .src-badge {
      color:#0a4a8a; background:rgba(10,74,138,.1);
      border-color:rgba(10,74,138,.3); font-weight:600;
    }
    body.theme-day .label-otc .src-badge {
      color:#0a6a32; background:rgba(10,106,50,.1);
      border-color:rgba(10,106,50,.3);
    }
    body.theme-day .card-code  { color:#0a3060; font-weight:700; }
    body.theme-day .card-name  { color:#020e1e; font-weight:700; }
    body.theme-day .card-time  { color:#0a3060; font-weight:500; }
    body.theme-day .card-title { color:#0a2238; opacity:1; }

    body.theme-day .mops-btn {
      color:#0a4a8a; border-color:rgba(10,74,138,.4);
      background:rgba(10,74,138,.08); font-weight:600;
    }
    body.theme-day .mops-btn:hover {
      background:rgba(10,74,138,.18); border-color:rgba(10,74,138,.6);
      box-shadow:0 2px 12px rgba(10,74,138,.25); color:#062a5a;
    }

    body.theme-day .state-box  { background:rgba(255,255,255,.9); border-color:rgba(10,48,96,.18); color:#0a2a4a; }
    body.theme-day .footer-note{ background:rgba(255,255,255,.6); border-color:rgba(10,48,96,.15); color:#0a2a4a; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">
      <div class="logo-icon">
        <img src="/images/jelly.png" alt="JellyStock" style="width:46px;height:46px;object-fit:contain;border-radius:9px;filter:drop-shadow(0 0 8px rgba(0,229,255,.4));position:relative;top:-4px;left:-4px;" onerror="this.style.display='none'"/>
      </div>
      <div>
        <div class="logo-text">JellyStock</div>
        <div class="logo-sub">重大訊息公告</div>
      </div>
    </div>
  </div>
  <div class="header-right">
    <a class="btn-back" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      返回首頁
    </a>
  </div>
</header>

<main>
  <div class="page-title-wrap">
    <div class="page-tag">MAJOR ANNOUNCEMENT · 重大訊息</div>
    <div class="page-title">今日重大訊息公告</div>
    <div class="page-desc">資料來源：TWSE 上市 / TPEx 上櫃 官方公告 · 點擊可至公開資訊觀測站查看詳細內容</div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterNews('all', this)">全部</button>
    <button class="filter-btn" onclick="filterNews('TWSE', this)">上市（TWSE）</button>
    <button class="filter-btn" onclick="filterNews('OTC', this)">上櫃（OTC）</button>

  </div>

  <div class="stats-bar">
    <span>共 <strong id="newsCount">--</strong> 則公告</span>
    <span>·</span>
    <span>日期：<strong id="newsDate">--</strong></span>
  </div>

  <div class="news-list" id="newsList">
    <div class="state-box">
      <div class="spinner"></div>
      正在載入今日重大訊息...
    </div>
  </div>

  <div class="footer-note">
    ⚠️ 本頁資料來源為 TWSE 台灣證券交易所及 TPEx 證券櫃檯買賣中心官方公告，版權歸原始單位所有。本站僅提供摘要查詢，點擊後將跳轉至公開資訊觀測站（MOPS）查看完整公告。
  </div>
</main>

<script>
let _allNews = [];
let _activeFilter = 'all';

const REFRESH_MS = 20 * 60 * 1000; // 20 分鐘
let _refreshTimer = null;

async function loadNews() {
  document.getElementById('newsList').innerHTML = `
    <div class="state-box"><div class="spinner"></div>正在載入今日重大訊息...</div>`;
  try {
    const res  = await fetch('/api/news');
    const data = await res.json();

    _allNews = data.data || [];

    // Update date display
    const d = data.date || '';
    if (d.length === 8) {
      document.getElementById('newsDate').textContent =
        `${d.slice(0,4)}/${d.slice(4,6)}/${d.slice(6,8)}`;
    }

    renderNews();
  } catch(e) {
    document.getElementById('newsList').innerHTML = `
      <div class="state-box">
        <div class="state-icon">⚠️</div>
        載入失敗，請稍後再試
      </div>`;
  }

  // 20 分鐘後自動重抓
  clearTimeout(_refreshTimer);
  _refreshTimer = setTimeout(loadNews, REFRESH_MS);
}

function renderNews() {
  const list = _activeFilter === 'all'
    ? _allNews
    : _allNews.filter(n => n.source === _activeFilter);

  document.getElementById('newsCount').textContent = list.length;

  if (!list.length) {
    document.getElementById('newsList').innerHTML = `
      <div class="state-box">
        <div class="state-icon">📭</div>
        今日尚無重大訊息公告
      </div>`;
    return;
  }

  document.getElementById('newsList').innerHTML = list.map((n,i) => `
    <div class="news-card label-${n.source.toLowerCase()}">
      <div class="card-left">
        <span class="src-badge">${n.label}</span>
        <span class="card-code">${n.code || '--'}</span>
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span class="card-name">${n.name || '--'}</span>
          <span class="card-time">${n.time || ''}</span>
        </div>
        <div class="card-title">${n.title || '--'}</div>
      </div>
      <a class="mops-btn"
         href="https://mops.twse.com.tw/mops/#/web/t05sr01_1?co_id=${n.code}"
         target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        MOPS查詢
      </a>
    </div>
  `).join('');
}

function filterNews(id, btn) {
  _activeFilter = id;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderNews();
}



// ── 主題同步（與主站、chapter 頁共用）──────────────────────────
(function() {
  function applyTheme(theme) {
    if (theme === 'day') {
      document.body.classList.add('theme-day');
    } else {
      document.body.classList.remove('theme-day');
    }
  }

  // 讀取全域主題（與主頁共用 key）
  var t = localStorage.getItem('jelly_global_theme') || 'space';
  applyTheme(t);

  // 監聽其他分頁的主題切換（BroadcastChannel）
  try {
    var _bc = new BroadcastChannel('jellystock_theme');
    _bc.onmessage = function(e) {
      if (e.data && e.data.theme) applyTheme(e.data.theme);
    };
  } catch(e) {}

  // storage 事件：同 session 其他頁更改主題時同步
  window.addEventListener('storage', function(e) {
    if (e.key === 'jelly_global_theme') {
      applyTheme(e.newValue || 'space');
    }
  });
})();

loadNews();
</script>
</body>
</html>
