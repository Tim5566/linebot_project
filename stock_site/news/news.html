<head>

  <style>
    :root {
      --bg:#03060d; --surface:#070d1a; --surface2:#0b1220;
      --border:rgba(0,229,255,.1); --accent:#00e5ff; --green:#00e676;
      --red:#ff3d5a; --yellow:#ffd600;
      --text:#d4e4f7; --text-dim:#9ab8d4; --text-faint:#5a7a98;
    }
    *{ margin:0; padding:0; box-sizing:border-box; }
    html,body{ background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; min-height:100vh; }

    /* Header */
    header {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px 0 16px; height: 58px;
      border-bottom: 1px solid rgba(0,229,255,.09);
      background: rgba(3,6,14,.97);
      backdrop-filter: blur(24px);
      box-shadow: 0 2px 24px rgba(0,0,0,.5);
    }
    .header-left { display:flex; align-items:center; }
    .header-right { display:flex; align-items:center; gap:12px; }
    .logo { display:flex; align-items:center; gap:14px; margin-left:4px; }
    .logo-icon { width:40px; height:40px; border-radius:9px; display:grid; place-items:center; position:relative; flex-shrink:0; overflow:visible; }
    .logo-text { font-family:'Orbitron',monospace; font-size:.95rem; font-weight:700; letter-spacing:.1em; color:#fff; text-shadow:0 0 20px rgba(0,229,255,.4); }
    .logo-sub { font-family:'Share Tech Mono',monospace; font-size:.52rem; color:var(--accent); letter-spacing:.22em; opacity:.65; margin-top:2px; }
    .btn-back {
      display:flex; align-items:center; gap:7px;
      padding:6px 14px; border-radius:20px;
      border:1px solid rgba(0,229,255,.18);
      background:rgba(0,229,255,.05);
      color:var(--text-dim); font-family:'Share Tech Mono',monospace;
      font-size:.68rem; letter-spacing:.08em; cursor:pointer;
      text-decoration:none; transition:all .2s;
    }
    .btn-back:hover { color:var(--accent); border-color:rgba(0,229,255,.35); background:rgba(0,229,255,.1); }
    .btn-back svg { width:14px; height:14px; }
    @keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.3} }

    /* Main */
    main{ max-width:900px; margin:0 auto; padding:28px 16px 60px; }

    /* Page Title */
    .page-title-wrap{ margin-bottom:24px; padding-bottom:18px; border-bottom:1px solid rgba(0,229,255,.14); }
    .page-tag{ font-family:'Share Tech Mono',monospace; font-size:.65rem; color:var(--accent); letter-spacing:.3em; opacity:.9; margin-bottom:8px; }
    .page-title{ font-family:'Orbitron',monospace; font-size:1.35rem; font-weight:900; color:#fff; letter-spacing:.04em; text-shadow:0 0 40px rgba(0,229,255,.3); }
    .page-desc{ font-size:.78rem; color:var(--text-dim); margin-top:8px; line-height:1.7; font-family:'Share Tech Mono',monospace; letter-spacing:.04em; }

    /* Filter */
    .filter-bar{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:20px; }
    .filter-btn{
      font-family:'Share Tech Mono',monospace; font-size:.68rem; letter-spacing:.1em;
      padding:7px 16px; border-radius:20px; cursor:pointer;
      border:1px solid rgba(0,229,255,.15); background:rgba(0,229,255,.03); color:var(--text-dim);
      transition:all .2s; line-height:1;
    }
    .filter-btn.active, .filter-btn:hover{ color:var(--accent); border-color:rgba(0,229,255,.4); background:rgba(0,229,255,.08); box-shadow:0 0 12px rgba(0,229,255,.12); }
    .news-card:hover { border-color:rgba(0,229,255,.18); }
    .mops-global-btn{
      margin-left:auto; display:flex; align-items:center; gap:7px;
      font-family:'Share Tech Mono',monospace; font-size:.65rem; letter-spacing:.1em;
      padding:7px 16px; border-radius:20px; text-decoration:none; white-space:nowrap;
      color:var(--accent); border:1px solid rgba(0,229,255,.3);
      background:rgba(0,229,255,.06); line-height:1;
      transition:all .2s;
    }
    .mops-global-btn:hover{ background:rgba(0,229,255,.13); border-color:rgba(0,229,255,.55); box-shadow:0 0 14px rgba(0,229,255,.18); }

    /* Stats */
    .stats-bar{ display:flex; gap:12px; align-items:center; margin-bottom:18px; font-family:'Share Tech Mono',monospace; font-size:.6rem; color:var(--text-faint); letter-spacing:.06em; flex-wrap:wrap; padding:8px 0; border-bottom:1px solid rgba(0,229,255,.08); }
    .stats-bar strong{ color:var(--accent); font-size:.7rem; }
    .stats-divider{ color:rgba(0,229,255,.25); }

    /* News list */
    .news-list{ display:flex; flex-direction:column; gap:6px; }

    .news-card{
      display:flex; align-items:stretch; gap:0;
      border-radius:10px;
      background:var(--surface); border:1px solid rgba(0,229,255,.07);
      color:inherit; position:relative; overflow:hidden;
      transition:border-color .15s, box-shadow .15s;
    }
    .news-card:hover { border-color:rgba(0,229,255,.18); box-shadow:0 0 20px rgba(0,229,255,.06); }

    /* 左側彩色邊條 */
    .news-card::before{
      content:''; flex-shrink:0; width:4px; align-self:stretch;
      background:var(--src-color,var(--accent));
      opacity:.8;
    }

    /* Labels */
    .label-twse{ --src-color:#00e5ff; }
    .label-otc { --src-color:#06d6a0; }

    /* 左側欄 */
    .card-left{
      flex-shrink:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:5px; width:62px; padding:12px 0;
      border-right:1px solid rgba(0,229,255,.08);
    }
    .card-code{
      font-family:'Share Tech Mono',monospace; font-size:.9rem;
      font-weight:700; color:#fff; letter-spacing:.04em;
      text-shadow:0 0 12px rgba(0,229,255,.25);
    }
    .label-otc .card-code{ text-shadow:0 0 12px rgba(6,214,160,.25); }
    .src-badge{
      font-family:'Share Tech Mono',monospace; font-size:.5rem; letter-spacing:.12em;
      padding:2px 6px; border-radius:4px;
      color:var(--src-color,var(--accent));
      background:rgba(0,229,255,.05);
      border:1px solid rgba(0,229,255,.14);
      white-space:nowrap;
    }
    .label-otc .src-badge{ color:#06d6a0; background:rgba(6,214,160,.05); border-color:rgba(6,214,160,.18); }

    .card-body{ flex:1; min-width:0; padding:12px 16px; }
    .card-meta{ display:flex; align-items:baseline; gap:7px; margin-bottom:6px; flex-wrap:wrap; }
    .card-name{ font-size:.88rem; font-weight:700; color:#fff; letter-spacing:.02em; }
    .card-sep{ color:var(--text-faint); font-size:.7rem; }
    .card-time{ font-family:'Share Tech Mono',monospace; font-size:.6rem; color:var(--text-faint); }
    .card-title{ font-size:.82rem; color:var(--text-dim); line-height:1.6; }

    /* State boxes */
    .state-box{
      text-align:center; padding:60px 20px;
      font-family:'Share Tech Mono',monospace; font-size:.76rem; color:var(--text-faint); letter-spacing:.08em;

    }
    .state-icon{ font-size:2rem; margin-bottom:14px; }
    .spinner{ width:28px; height:28px; margin:0 auto 16px; border:2px solid rgba(0,229,255,.15); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin{ to{transform:rotate(360deg)} }

    /* Footer note */
    .footer-note{
      margin-top:28px; padding:14px 18px;
      background:rgba(0,229,255,.04); border:1px solid rgba(0,229,255,.1); border-radius:12px;
      font-family:'Share Tech Mono',monospace; font-size:.62rem; color:var(--text-faint); letter-spacing:.05em; line-height:1.8;
    }

    @media(max-width:600px){
      header{ padding:0 12px; height:54px; }
      .logo-text{ font-size:.78rem; }
      .logo-sub{ display:none; }
      .btn-back{ font-size:.62rem; padding:5px 10px; }

      .mops-global-btn{ font-size:.6rem; padding:6px 10px; }
      .stats-bar{ font-size:.56rem; gap:8px; margin-bottom:14px; }
      .news-list{ gap:5px; }
      .card-left{ width:52px; padding:10px 0; }

      .card-body{ padding:10px 12px; }

    /* ═══════════════════════════════════════════════════════
       ☀️  白天晴空主題 (theme-day)

    body.theme-day .page-tag   { color:#0a3a70; opacity:1; font-weight:700; letter-spacing:.35em; }

    }

    /* Stats bar */
    body.theme-day .stats-bar {

    }
    body.theme-day .stats-bar strong { color:#0a3a7a; font-weight:700; }
    body.theme-day .stats-divider { color:rgba(10,60,120,.28); }

    /* News cards */
    body.theme-day .news-card {
      background: rgba(255,255,255,.97);
      border-color: rgba(10,60,120,.14);
      box-shadow: 0 1px 6px rgba(10,40,100,.07);
    }
    body.theme-day .news-card:hover {
      border-color:rgba(10,60,120,.32);

    }
    body.theme-day .label-twse { --src-color:#0a52a0; }
    body.theme-day .label-otc  { --src-color:#0a7030; }
    body.theme-day .news-card::before { opacity:.9; }

    /* Card left 欄 */
    body.theme-day .card-left { border-right-color:rgba(10,60,120,.12); }
    body.theme-day .card-code { color:#071628; text-shadow:none; font-weight:800; }
    body.theme-day .label-otc .card-code { text-shadow:none; }
    body.theme-day .src-badge {

<script>
let _allNews = [];
let _activeFilter = 'all';
let _renderedCount = 0;
const PAGE_SIZE = 50;

// ── 前端 sessionStorage 快取（同一個 tab 不重複打 API）──────────
// 後端 /api/news 建議也做 server-side 快取（memory 或檔案），
// 每 5 分鐘更新一次，這樣不管多少用戶進來都只打一次上游 TWSE/TPEx。
const CACHE_KEY   = 'jelly_news_cache';
const CACHE_TTL   = 5 * 60 * 1000; // 5 分鐘
const REFRESH_MS  = 20 * 60 * 1000;
let _refreshTimer = null;

async function loadNews(forceRefresh = false) {
  // 嘗試從 sessionStorage 讀快取
  if (!forceRefresh) {
    try {
      const raw = sessionStorage.getItem(CACHE_KEY);
      if (raw) {
        const cache = JSON.parse(raw);
        if (Date.now() - cache.ts < CACHE_TTL) {
          _allNews = cache.data;
          setDate(cache.date);
          renderNews();
          clearTimeout(_refreshTimer);
          _refreshTimer = setTimeout(() => loadNews(true), REFRESH_MS);
          return; // 命中快取，直接返回
        }
      }
    } catch(e) {}
  }

  document.getElementById('newsList').innerHTML = `
    <div class="state-box"><div class="spinner"></div>正在載入今日重大訊息...</div>`;
  try {
    const res  = await fetch('/api/news');
    const data = await res.json();

    _allNews = data.data || [];

    // 寫入 sessionStorage 快取
    try {
      sessionStorage.setItem(CACHE_KEY, JSON.stringify({
        ts: Date.now(), data: _allNews, date: data.date || ''
      }));
    } catch(e) {}

    setDate(data.date || '');
    renderNews();
  } catch(e) {
    document.getElementById('newsList').innerHTML = `
      <div class="state-box">
        <div class="state-icon">⚠️</div>
        載入失敗，請稍後再試
      </div>`;
  }

  clearTimeout(_refreshTimer);
  _refreshTimer = setTimeout(() => loadNews(true), REFRESH_MS);
}

function setDate(d) {
  if (d && d.length === 8) {
    document.getElementById('newsDate').textContent =
      `${d.slice(0,4)}/${d.slice(4,6)}/${d.slice(6,8)}`;
  }
}

function getFilteredList() {
  return _activeFilter === 'all'
    ? _allNews
    : _allNews.filter(n => n.source === _activeFilter);
}

function cardHTML(n, globalIdx) {
  return `
    <div class="news-card label-${n.source.toLowerCase()}">
      <div class="card-left">
        <span class="card-code">${n.code || '--'}</span>
        <span class="src-badge">${n.label}</span>
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span class="card-name">${n.name || '--'}</span>
          <span class="card-sep">·</span>
          <span class="card-time">${n.time || ''}</span>
        </div>
        <div class="card-title">${n.title || '--'}</div>
      </div>
    </div>`;
}

function renderNews() {
  const list = getFilteredList();
  _renderedCount = 0;

  document.getElementById('newsCount').textContent = list.length;

  if (!list.length) {
    document.getElementById('newsList').innerHTML = `
      <div class="state-box">
        <div class="state-icon">📭</div>
        今日尚無重大訊息公告
      </div>`;
    return;
  }

  const batch = list.slice(0, PAGE_SIZE);
  _renderedCount = batch.length;
  document.getElementById('newsList').innerHTML =
    batch.map((n, i) => cardHTML(n, i)).join('') +
    (_renderedCount < list.length ? `<div id="load-sentinel" style="height:40px;"></div>` : '');

  setupSentinel(list);
}

function appendMore(list) {
  const sentinel = document.getElementById('load-sentinel');
  if (!sentinel) return;

  const batch = list.slice(_renderedCount, _renderedCount + PAGE_SIZE);
  if (!batch.length) { sentinel.remove(); return; }

  const startIdx = _renderedCount;
  batch.forEach((n, i) => {
    const div = document.createElement('div');
    div.innerHTML = cardHTML(n, startIdx + i);
    sentinel.before(div.firstElementChild);
  });
  _renderedCount += batch.length;

  if (_renderedCount >= list.length) sentinel.remove();
}

function setupSentinel(list) {
  const sentinel = document.getElementById('load-sentinel');
  if (!sentinel) return;
  const obs = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) appendMore(list);
  }, { rootMargin: '200px' });
  obs.observe(sentinel);
}

function filterNews(id, btn) {
  _activeFilter = id;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderNews();
}



// 開啟 MOPS 單筆公告（前端 POST，從用戶瀏覽器直接送出）
function openDetail(idx) {
  const list = _activeFilter === 'all'
    ? _allNews
    : _allNews.filter(n => n.source === _activeFilter);
  const n = list[idx];
  if (!n) return;

  const skey = n.skey || '';

  // 有 skey 才用 POST 開單筆，否則開公司列表（舊版 MOPS 格式）
  if (!skey) {
    // 用舊版 mopsov 網址，直接帶 co_id 查詢該公司今日公告
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = 'https://mopsov.twse.com.tw/mops/web/t05sr01_1';
    form.target = '_blank';
    const fields = {
      step: '0', firstin: 'true', off: '1',
      TYPEK: 'all', newstuff: '1',
      co_id: n.code, COMPANY_ID: n.code,
      COMPANY_NAME: n.name, stp: '1',
    };
    Object.entries(fields).forEach(([k,v]) => {
      const inp = document.createElement('input');
      inp.type='hidden'; inp.name=k; inp.value=v;
      form.appendChild(inp);
    });
    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);
    return;
  }

  // 解析 skey 取得各參數
  const co_id     = n.code;
  const spokeTime = (n.time || '').replace(/:/g, '');
  // skey 格式：公司代號 + 日期8碼 + 序號
  const dateStart = co_id.length;
  const spokeDate = skey.slice(dateStart, dateStart + 8);
  const seqNo     = skey.slice(dateStart + 8) || '1';

  // 動態建立 POST 表單，從瀏覽器直接送出到 MOPS
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = 'https://mopsov.twse.com.tw/mops/web/ajax_t05sr01_1';
  form.target = '_blank';

  const fields = {
    step:         '1',
    firstin:      'true',
    off:          '1',
    TYPEK:        'all',
    co_id:        co_id,
    COMPANY_ID:   co_id,
    COMPANY_NAME: n.name,
    SPOKE_DATE:   spokeDate,
    SPOKE_TIME:   spokeTime,
    SEQ_NO:       seqNo,
    skey:         skey,
    newstuff:     '1',
    hhc_co_name:  n.name,
    stp:          '1',
  };

  Object.entries(fields).forEach(([k, v]) => {
    const inp = document.createElement('input');
    inp.type = 'hidden'; inp.name = k; inp.value = v;
    form.appendChild(inp);
  });

  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);
}

// ── 主題同步（與主站、chapter 頁共用）──────────────────────────
(function() {
  function applyTheme(theme) {
    if (theme === 'day') {
      document.body.classList.add('theme-day');
    } else {
      document.body.classList.remove('theme-day');
    }
  }

  // 讀取全域主題（與主頁共用 key）
  var t = localStorage.getItem('jelly_global_theme') || 'space';
  applyTheme(t);

  // 監聽其他分頁的主題切換（BroadcastChannel）
  try {
    var _bc = new BroadcastChannel('jellystock_theme');
    _bc.onmessage = function(e) {
      if (e.data && e.data.theme) applyTheme(e.data.theme);
    };
  } catch(e) {}

  // storage 事件：同 session 其他頁更改主題時同步
  window.addEventListener('storage', function(e) {
    if (e.key === 'jelly_global_theme') {
      applyTheme(e.newValue || 'space');
    }
  });
})();

loadNews();
</script>
