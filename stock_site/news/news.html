<!DOCTYPE html>
<html lang="zh-TW" style="scroll-behavior:smooth">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>重大訊息 — JellyStock 盤後雷達</title>
  <meta name="description" content="台股上市上櫃今日重大訊息公告，資料來源 TWSE、TPEx 官方，即時更新。"/>
  <meta property="og:title" content="重大訊息 — JellyStock 盤後雷達"/>
  <meta property="og:description" content="台股上市上櫃今日重大訊息公告，資料來源 TWSE、TPEx 官方。"/>
  <meta property="og:image" content="/images/jelly.png"/>
  <link rel="icon" type="image/png" href="/images/jelly.png"/>
  <link rel="apple-touch-icon" href="/images/jelly.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#03060d; --surface:#070d1a; --surface2:#0b1220;
      --border:rgba(0,229,255,.1); --accent:#00e5ff; --green:#00e676;
      --red:#ff3d5a; --yellow:#ffd600;
      --text:#d4e4f7; --text-dim:#7a9ab8; --text-faint:#4a6888;
    }
    *{ margin:0; padding:0; box-sizing:border-box; }
    html,body{ background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; min-height:100vh; }

    /* Header */
    header{
      position:sticky; top:0; z-index:100;
      height:56px; display:flex; align-items:center; justify-content:space-between;
      padding:0 20px;
      background:rgba(3,6,13,.93); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
    }
    .header-left{ display:flex; align-items:center; gap:14px; }
    .back-btn{
      display:flex; align-items:center; gap:7px;
      color:var(--text-dim); text-decoration:none;
      font-family:'Share Tech Mono',monospace; font-size:.72rem; letter-spacing:.08em;
      padding:7px 12px; border-radius:10px;
      border:1px solid rgba(0,229,255,.12); background:rgba(0,229,255,.03);
      transition:all .2s;
    }
    .back-btn:hover{ color:var(--accent); border-color:rgba(0,229,255,.3); background:rgba(0,229,255,.07); }
    .back-btn svg{ width:14px; height:14px; }
    .header-title{ font-family:'Orbitron',monospace; font-size:.82rem; font-weight:700; color:#fff; letter-spacing:.06em; }
    .header-title span{ color:var(--accent); }
    .refresh-info{ font-family:'Share Tech Mono',monospace; font-size:.62rem; color:var(--text-faint); letter-spacing:.06em; display:flex; align-items:center; gap:8px; }
    .live-dot{ width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:blink 2s ease-in-out infinite; }
    @keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.3} }

    /* Main */
    main{ max-width:900px; margin:0 auto; padding:28px 16px 60px; }

    /* Page Title */
    .page-title-wrap{ margin-bottom:24px; padding-bottom:18px; border-bottom:1px solid rgba(0,229,255,.08); }
    .page-tag{ font-family:'Share Tech Mono',monospace; font-size:.65rem; color:var(--accent); letter-spacing:.3em; opacity:.7; margin-bottom:8px; }
    .page-title{ font-family:'Orbitron',monospace; font-size:1.35rem; font-weight:900; color:#fff; letter-spacing:.04em; text-shadow:0 0 40px rgba(0,229,255,.3); }
    .page-desc{ font-size:.78rem; color:var(--text-dim); margin-top:8px; line-height:1.7; font-family:'Share Tech Mono',monospace; letter-spacing:.04em; }

    /* Filter */
    .filter-bar{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
    .filter-btn{
      font-family:'Share Tech Mono',monospace; font-size:.68rem; letter-spacing:.1em;
      padding:7px 16px; border-radius:20px; cursor:pointer;
      border:1px solid rgba(0,229,255,.15); background:rgba(0,229,255,.03); color:var(--text-dim);
      transition:all .2s;
    }
    .filter-btn.active, .filter-btn:hover{ color:var(--accent); border-color:rgba(0,229,255,.4); background:rgba(0,229,255,.08); box-shadow:0 0 12px rgba(0,229,255,.12); }

    /* Stats */
    .stats-bar{ display:flex; gap:16px; align-items:center; margin-bottom:16px; font-family:'Share Tech Mono',monospace; font-size:.62rem; color:var(--text-faint); letter-spacing:.06em; flex-wrap:wrap; }
    .stats-bar strong{ color:var(--accent); }

    /* News list */
    .news-list{ display:flex; flex-direction:column; gap:8px; }

    .news-card{
      display:flex; align-items:flex-start; gap:14px;
      padding:14px 18px; border-radius:12px;
      background:var(--surface); border:1px solid rgba(0,229,255,.07);
      text-decoration:none; color:inherit;
      transition:all .2s cubic-bezier(.22,1,.36,1);
      position:relative; overflow:hidden;
    }
    .news-card::before{
      content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
      background:var(--src-color,var(--accent)); opacity:.5; transition:opacity .2s;
    }
    .news-card:hover{ border-color:rgba(0,229,255,.2); transform:translateX(3px); box-shadow:0 4px 24px rgba(0,0,0,.3); }
    .news-card:hover::before{ opacity:1; }

    /* Labels */
    .label-twse{ --src-color:#00e5ff; }
    .label-otc { --src-color:#06d6a0; }

    .card-left{ flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:6px; min-width:52px; }
    .src-badge{
      font-family:'Share Tech Mono',monospace; font-size:.58rem; letter-spacing:.1em;
      padding:3px 8px; border-radius:6px;
      color:var(--src-color,var(--accent));
      background:rgba(0,229,255,.06);
      border:1px solid rgba(0,229,255,.15);
      white-space:nowrap;
    }
    .label-otc .src-badge{ color:#06d6a0; background:rgba(6,214,160,.06); border-color:rgba(6,214,160,.2); }
    .card-code{ font-family:'Share Tech Mono',monospace; font-size:.7rem; color:var(--text-dim); letter-spacing:.06em; }

    .card-body{ flex:1; min-width:0; }
    .card-meta{ display:flex; align-items:center; gap:10px; margin-bottom:5px; flex-wrap:wrap; }
    .card-name{ font-size:.82rem; font-weight:700; color:#fff; }
    .card-time{ font-family:'Share Tech Mono',monospace; font-size:.6rem; color:var(--text-faint); }
    .card-title{ font-size:.84rem; color:var(--text-dim); line-height:1.55; }
    .news-card:hover .card-title{ color:var(--text); }

    .card-arrow{ flex-shrink:0; color:var(--text-faint); transition:color .2s, transform .2s; margin-top:2px; }
    .news-card:hover .card-arrow{ color:var(--accent); transform:translateX(3px); }

    /* State boxes */
    .state-box{
      text-align:center; padding:60px 20px;
      font-family:'Share Tech Mono',monospace; font-size:.76rem; color:var(--text-faint); letter-spacing:.08em;
      border:1px solid rgba(0,229,255,.07); border-radius:14px; background:var(--surface);
    }
    .state-icon{ font-size:2rem; margin-bottom:14px; }
    .spinner{ width:28px; height:28px; margin:0 auto 16px; border:2px solid rgba(0,229,255,.15); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin{ to{transform:rotate(360deg)} }

    /* Footer note */
    .footer-note{
      margin-top:28px; padding:14px 18px;
      background:rgba(0,229,255,.02); border:1px solid rgba(0,229,255,.06); border-radius:12px;
      font-family:'Share Tech Mono',monospace; font-size:.62rem; color:var(--text-faint); letter-spacing:.05em; line-height:1.8;
    }

    /* Mobile */
    @media(max-width:600px){
      header{ padding:0 12px; }
      main{ padding:20px 12px 60px; }
      .page-title{ font-size:1.1rem; }
      .card-left{ min-width:44px; }
      .refresh-info span:last-child{ display:none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <a class="back-btn" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      返回首頁
    </a>
    <div class="header-title">Jelly<span>Stock</span></div>
  </div>
  <div class="refresh-info">
    <div class="live-dot"></div>
    <span id="updateTime">載入中...</span>
  </div>
</header>

<main>
  <div class="page-title-wrap">
    <div class="page-tag">MAJOR ANNOUNCEMENT · 重大訊息</div>
    <div class="page-title">今日重大訊息公告</div>
    <div class="page-desc">資料來源：TWSE 上市 / TPEx 上櫃 官方公告 · 點擊可至公開資訊觀測站查看詳細內容</div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterNews('all', this)">全部</button>
    <button class="filter-btn" onclick="filterNews('TWSE', this)">上市（TWSE）</button>
    <button class="filter-btn" onclick="filterNews('OTC', this)">上櫃（OTC）</button>
  </div>

  <div class="stats-bar">
    <span>共 <strong id="newsCount">--</strong> 則公告</span>
    <span>·</span>
    <span>日期：<strong id="newsDate">--</strong></span>
  </div>

  <div class="news-list" id="newsList">
    <div class="state-box">
      <div class="spinner"></div>
      正在載入今日重大訊息...
    </div>
  </div>

  <div class="footer-note">
    ⚠️ 本頁資料來源為 TWSE 台灣證券交易所及 TPEx 證券櫃檯買賣中心官方公告，版權歸原始單位所有。本站僅提供摘要查詢，點擊後將跳轉至公開資訊觀測站（MOPS）查看完整公告。
  </div>
</main>

<script>
let _allNews = [];
let _activeFilter = 'all';

async function loadNews() {
  document.getElementById('newsList').innerHTML = `
    <div class="state-box"><div class="spinner"></div>正在載入今日重大訊息...</div>`;
  try {
    const res  = await fetch('/api/news');
    const data = await res.json();

    _allNews = data.data || [];

    // Update date display
    const d = data.date || '';
    if (d.length === 8) {
      document.getElementById('newsDate').textContent =
        `${d.slice(0,4)}/${d.slice(4,6)}/${d.slice(6,8)}`;
    }

    renderNews();
  } catch(e) {
    document.getElementById('newsList').innerHTML = `
      <div class="state-box">
        <div class="state-icon">⚠️</div>
        載入失敗，請稍後再試
      </div>`;
  }
}

function renderNews() {
  const list = _activeFilter === 'all'
    ? _allNews
    : _allNews.filter(n => n.source === _activeFilter);

  document.getElementById('newsCount').textContent = list.length;

  // Update time
  const now = new Date();
  document.getElementById('updateTime').textContent =
    `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} 更新`;

  if (!list.length) {
    document.getElementById('newsList').innerHTML = `
      <div class="state-box">
        <div class="state-icon">📭</div>
        今日尚無重大訊息公告
      </div>`;
    return;
  }

  document.getElementById('newsList').innerHTML = list.map(n => `
    <a class="news-card label-${n.source.toLowerCase()}"
       href="${n.link}" target="_blank" rel="noopener noreferrer">
      <div class="card-left">
        <span class="src-badge">${n.label}</span>
        <span class="card-code">${n.code || '--'}</span>
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span class="card-name">${n.name || '--'}</span>
          <span class="card-time">${n.time || ''}</span>
        </div>
        <div class="card-title">${n.title || '--'}</div>
      </div>
      <div class="card-arrow">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>
    </a>
  `).join('');
}

function filterNews(id, btn) {
  _activeFilter = id;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderNews();
}

loadNews();
</script>
</body>
</html>
